services:
  postgres:
    image: postgres:16-alpine
    container_name: aegisiq-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegisiq}
      POSTGRES_USER: ${POSTGRES_USER:-aegisiq}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegisiq_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegisiq} -d ${POSTGRES_DB:-aegisiq}"]
      interval: 5s
      timeout: 5s
      retries: 5

  neo4j:
    image: neo4j:5-community
    container_name: aegisiq-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-aegisiq_dev}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aegisiq-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: aegisiq-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres-data:
  neo4j-data:
  qdrant-data:
  redis-data:
