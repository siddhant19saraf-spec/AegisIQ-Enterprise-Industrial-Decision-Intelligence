services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    restart: always

  neo4j:
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    restart: always

  qdrant:
    restart: always

  redis:
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: aegisiq-backend
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: aegisiq-frontend
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: always
